# Ultralytics YOLO11 object detection model with P3/8 - P5/32 outputs

nc: 80
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

channels: 4
backbone:
  - [-1, 1, Silence, []]  # 0
  # visible
  - [0, 1, SilenceChannel, [0,3]]  # 1
  - [-1, 1, Conv, [64, 3, 2]] # 2
  - [-1, 1, Conv, [128, 3, 2]] # 3
  - [-1, 2, C3k2, [256, False, 0.25]] # 4
  - [-1, 1, Conv, [256, 3, 2]] # 5
  - [-1, 2, C3k2, [512, False, 0.25]] # 6 RGB P3
  - [-1, 1, Conv, [512, 3, 2]] # 7
  - [-1, 2, C3k2, [512, True]] # 8 RGB P4
  - [-1, 1, Conv, [1024, 3, 2]] # 9
  - [-1, 2, C3k2, [1024, True]] # 10 RGB P5

  # infrared
  - [0, 1, SilenceChannel, [3,4]]  # 11
  - [-1, 1, Conv, [64, 3, 2]] # 12
  - [-1, 1, Conv, [128, 3, 2]] # 13
  - [-1, 2, C3k2, [256, False, 0.25]] # 14
  - [-1, 1, Conv, [256, 3, 2]] # 15
  - [-1, 2, C3k2, [512, False, 0.25]] # 16 IR P3
  - [-1, 1, Conv, [512, 3, 2]] # 17
  - [-1, 2, C3k2, [512, True]] # 18 IR P4
  - [-1, 1, Conv, [1024, 3, 2]] # 19
  - [-1, 2, C3k2, [1024, True]] # 20 IR P5

  # CIFusion_v6 uses CBAM attention and keeps 2C channels; 1x1 Conv compresses 2C -> C.
  - [[6, 16], 1, Concat, [1]]  # 21 P3 concat
  - [-1, 1, CIFusion_v6, []]  # 22
  - [-1, 1, Conv, [512, 1, 1]] # 23 fused P3
  - [[8, 18], 1, Concat, [1]]  # 24 P4 concat
  - [-1, 1, CIFusion_v6, []]  # 25
  - [-1, 1, Conv, [512, 1, 1]] # 26 fused P4
  - [[10, 20], 1, Concat, [1]]  # 27 P5 concat
  - [-1, 1, CIFusion_v6, []]  # 28
  - [-1, 1, Conv, [1024, 1, 1]] # 29 fused P5

  - [-1, 1, SPPF, [1024, 5]] # 30
  - [-1, 2, C2PSA, [1024]] # 31

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 26], 1, Concat, [1]]
  - [-1, 2, C3k2, [512, False]] # 34

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 23], 1, Concat, [1]]
  - [-1, 2, C3k2, [256, False]] # 37

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 34], 1, Concat, [1]]
  - [-1, 2, C3k2, [512, False]] # 40

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 31], 1, Concat, [1]]
  - [-1, 2, C3k2, [1024, True]] # 43

  - [[37, 40, 43], 1, OBB, [nc, 1]]
