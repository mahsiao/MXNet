# Ultralytics YOLO11 object detection model with P3/8 - P5/32 outputs

# Parameters
nc: 80 # number of classes
scales:
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

channels: 4
ch: 4
backbone:
  # [from, repeats, module, args]
  - [-1, 1, Silence, []]  # 0 original RGBT input
  - [0, 1, LP, []]  # 1 illumination prior from visible RGB channels

  # visible
  - [0, 1, SilenceChannel, [0,3]]  # 2
  - [-1, 1, Conv, [64, 3, 2]] # 3
  - [-1, 1, Conv, [128, 3, 2]] # 4
  - [-1, 2, C3k2, [256, False, 0.25]] # 5
  - [-1, 1, Conv, [256, 3, 2]] # 6
  - [-1, 2, C3k2, [512, False, 0.25]] # 7 RGB P3

  # infrared
  - [0, 1, SilenceChannel, [3,4]]  # 8
  - [-1, 1, Conv, [64, 3, 2]] # 9
  - [-1, 1, Conv, [128, 3, 2]] # 10
  - [-1, 2, C3k2, [256, False, 0.25]] # 11
  - [-1, 1, Conv, [256, 3, 2]] # 12
  - [-1, 2, C3k2, [512, False, 0.25]] # 13 IR P3

  # P3-only illumination-guided residual fusion.
  # Inputs are [visible P3, infrared P3, illumination prior].
  - [[7, 13, 1], 1, ResidualIlluminationFusion, []]  # 14 fused P3
  - [-1, 1, Conv, [512, 1, 1]] # 15 P3/8

  - [-1, 1, Conv, [512, 3, 2]] # 16 P4/16
  - [-1, 2, C3k2, [512, True]] # 17
  - [-1, 1, Conv, [1024, 3, 2]] # 18 P5/32
  - [-1, 2, C3k2, [1024, True]] # 19
  - [-1, 1, SPPF, [1024, 5]] # 20
  - [-1, 2, C2PSA, [1024]] # 21

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 17], 1, Concat, [1]] # cat backbone P4
  - [-1, 2, C3k2, [512, False]] # 24

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 15], 1, Concat, [1]] # cat fused backbone P3
  - [-1, 2, C3k2, [256, False]] # 27

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 24], 1, Concat, [1]] # cat head P4
  - [-1, 2, C3k2, [512, False]] # 30

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 21], 1, Concat, [1]] # cat head P5
  - [-1, 2, C3k2, [1024, True]] # 33

  - [[27, 30, 33], 1, OBB, [nc, 1]]
