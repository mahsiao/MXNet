# Ultralytics YOLO11 object detection model with P3/8 - P5/32 outputs

nc: 80
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

channels: 4
ch: 4
backbone:
  - [-1, 1, Silence, []]  # 0
  # visible
  - [0, 1, SilenceChannel, [0,3]]  # 1
  - [-1, 1, Conv, [64, 3, 2]] # 2
  - [-1, 1, Conv, [128, 3, 2]] # 3
  - [-1, 2, C3k2, [256, False, 0.25]] # 4
  - [-1, 1, Conv, [256, 3, 2]] # 5
  - [-1, 2, C3k2, [512, False, 0.25]] # 6 RGB P3

  # infrared
  - [0, 1, SilenceChannel, [3,4]]  # 7
  - [-1, 1, Conv, [64, 3, 2]] # 8
  - [-1, 1, Conv, [128, 3, 2]] # 9
  - [-1, 2, C3k2, [256, False, 0.25]] # 10
  - [-1, 1, Conv, [256, 3, 2]] # 11
  - [-1, 2, C3k2, [512, False, 0.25]] # 12 IR P3

  # P3-only CIFusion_v6, then 1x1 Conv compresses 2C -> C.
  - [[6, 12], 1, Concat, [1]]  # 13 P3 concat
  - [-1, 1, CIFusion_v6, []]  # 14
  - [-1, 1, Conv, [512, 1, 1]] # 15 fused P3

  - [-1, 1, Conv, [512, 3, 2]] # 16 P4
  - [-1, 2, C3k2, [512, True]] # 17
  - [-1, 1, Conv, [1024, 3, 2]] # 18 P5
  - [-1, 2, C3k2, [1024, True]] # 19
  - [-1, 1, SPPF, [1024, 5]] # 20
  - [-1, 2, C2PSA, [1024]] # 21

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 17], 1, Concat, [1]]
  - [-1, 2, C3k2, [512, False]] # 24

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 15], 1, Concat, [1]]
  - [-1, 2, C3k2, [256, False]] # 27

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 24], 1, Concat, [1]]
  - [-1, 2, C3k2, [512, False]] # 30

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 21], 1, Concat, [1]]
  - [-1, 2, C3k2, [1024, True]] # 33

  - [[27, 30, 33], 1, OBB, [nc, 1]]
