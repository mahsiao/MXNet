# Ultralytics YOLO11 object detection model with P3/8 - P5/32 outputs

nc: 80
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

channels: 4
backbone:
  - [-1, 1, Silence, []]  # 0 original RGBT input

  # visible
  - [0, 1, SilenceChannel, [0,3]]  # 1 RGB image
  - [1, 1, LIF, []]  # 2 light intensity weight
  - [1, 1, Conv, [64, 3, 2]] # 3
  - [-1, 1, Conv, [128, 3, 2]] # 4
  - [-1, 2, C3k2, [256, False, 0.25]] # 5
  - [-1, 1, Conv, [256, 3, 2]] # 6
  - [-1, 2, C3k2, [512, False, 0.25]] # 7 RGB P3
  - [-1, 1, Conv, [512, 3, 2]] # 8
  - [-1, 2, C3k2, [512, True]] # 9 RGB P4
  - [-1, 1, Conv, [1024, 3, 2]] # 10
  - [-1, 2, C3k2, [1024, True]] # 11 RGB P5

  # infrared
  - [0, 1, SilenceChannel, [3,4]]  # 12 IR image
  - [-1, 1, Conv, [64, 3, 2]] # 13
  - [-1, 1, Conv, [128, 3, 2]] # 14
  - [-1, 2, C3k2, [256, False, 0.25]] # 15
  - [-1, 1, Conv, [256, 3, 2]] # 16
  - [-1, 2, C3k2, [512, False, 0.25]] # 17 IR P3
  - [-1, 1, Conv, [512, 3, 2]] # 18
  - [-1, 2, C3k2, [512, True]] # 19 IR P4
  - [-1, 1, Conv, [1024, 3, 2]] # 20
  - [-1, 2, C3k2, [1024, True]] # 21 IR P5

  # LIFAdd inputs are [IR feature, RGB feature, LIF weight].
  - [[17, 7, 2], 1, LIFAdd, [3]]  # 22 fused P3
  - [[19, 9, 2], 1, LIFAdd, [4]]  # 23 fused P4
  - [[21, 11, 2], 1, LIFAdd, [5]]  # 24 fused P5

  - [-1, 1, SPPF, [1024, 5]] # 25
  - [-1, 2, C2PSA, [1024]] # 26

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 23], 1, Concat, [1]]
  - [-1, 2, C3k2, [512, False]] # 29

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 22], 1, Concat, [1]]
  - [-1, 2, C3k2, [256, False]] # 32

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 29], 1, Concat, [1]]
  - [-1, 2, C3k2, [512, False]] # 35

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 26], 1, Concat, [1]]
  - [-1, 2, C3k2, [1024, True]] # 38

  - [[32, 35, 38], 1, OBB, [nc, 1]]
